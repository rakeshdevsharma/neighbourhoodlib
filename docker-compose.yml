services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-library}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library}
      POSTGRES_DB: ${POSTGRES_DB:-library}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library} -d ${POSTGRES_DB:-library}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-library}:${POSTGRES_PASSWORD:-library}@db:5432/${POSTGRES_DB:-library}
      GRPC_PORT: "50051"
      LOAN_PERIOD_DAYS: ${LOAN_PERIOD_DAYS:-14}
      FINE_CENTS_PER_DAY: ${FINE_CENTS_PER_DAY:-25}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"   # gRPC-Web endpoint for the browser
      - "9901:9901"   # Envoy admin
    depends_on:
      - server

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Baked into the client bundle at build time (browser -> Envoy).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - envoy

volumes:
  pgdata:
